name: "Terraform CI/CD — PFE Infrastructure Cloud"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # ── Authentification Azure ──────────────────────────
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_ACCESS_KEY:      ${{ secrets.AZURE_STORAGE_KEY }}

  # ── Variables Terraform ─────────────────────────────
  TF_VAR_admin_ip:              "0.0.0.0/0"
  TF_VAR_vm_size:               "Standard_B2ls_v2"
  TF_VAR_bastion_public_key_path: "./keys/bastion-vm_key.pem.pub"
  TF_VAR_web_public_key_path:     "./keys/web-vm_key.pem.pub"
  TF_VAR_db_public_key_path:      "./keys/db-vm_key.pem.pub"

jobs:
  terraform:
    name: "Terraform CI/CD"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: TFSec Security Scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true

      - name: Terraform Init
        run: terraform init

      - name: Break State Lease if Locked
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}
          az storage blob lease break \
            --blob-name tfstate/pfe.terraform.tfstate \
            --container-name tfstate \
            --account-name tfstatepfe2026 \
            --account-key ${{ secrets.AZURE_STORAGE_KEY }}
        continue-on-error: true

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -lock=false -input=false -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -lock=false -input=false tfplan